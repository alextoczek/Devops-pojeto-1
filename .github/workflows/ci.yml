name: CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main, Inicio ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verificar Python
        run: python --version